<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}LunchToOffice{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e9590c",
                        "primary-dark": "#c2410c",
                        "primary-hover": "#cc4d0a",
                        "primary-light": "#fed7aa",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221610",
                        "slate-gray": "#334155",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2d1f18",
                        "neutral-50": "#fafaf9",
                        "neutral-100": "#f5f5f4",
                        "neutral-200": "#e7e5e4",
                        "neutral-300": "#d6d3d1",
                        "neutral-400": "#a8a29e",
                        "neutral-500": "#78716c",
                        "neutral-600": "#57534e",
                        "neutral-700": "#44403c",
                        "neutral-800": "#292524",
                        "neutral-900": "#1c1917",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    {% block extra_head %}{% endblock %}
    <style>
        {% block styles %}

            {% endblock %}
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased {% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>

</html>
